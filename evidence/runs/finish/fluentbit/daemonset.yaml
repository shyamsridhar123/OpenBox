apiVersion: v1
kind: ServiceAccount
metadata:
  name: fluent-bit
  namespace: logging
  annotations:
    azure.workload.identity/client-id: "e87371a2-eef4-45d4-9977-0223abda223e"
  labels:
    azure.workload.identity/use: "true"
---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: fluent-bit
  namespace: logging
  labels:
    app: fluent-bit
spec:
  selector:
    matchLabels:
      app: fluent-bit
  template:
    metadata:
      labels:
        app: fluent-bit
        azure.workload.identity/use: "true"
    spec:
      serviceAccountName: fluent-bit
      hostNetwork: false
      tolerations:
        - operator: Exists
      containers:
        - name: shipper
          image: mcr.microsoft.com/cbl-mariner/base/python:3
          imagePullPolicy: IfNotPresent
          env:
            - name: EH_FQDN
              value: "evhns-opensandbox-dev.servicebus.windows.net"
            - name: EH_NAME
              value: "sandbox-audit-fast"
            - name: LOG_GLOB
              value: "/var/log/containers/*opensandbox*.log"
            - name: NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
            - name: PIP_DISABLE_PIP_VERSION_CHECK
              value: "1"
          command: ["/bin/sh", "-c"]
          args:
            - |
              set -e
              echo "[init] installing azure sdks..."
              python3 -m pip install --quiet --no-cache-dir azure-identity==1.19.0 azure-eventhub==5.13.0
              echo "[init] launching shipper..."
              exec python3 /opt/shipper/shipper.py
          volumeMounts:
            - name: varlog
              mountPath: /var/log
              readOnly: true
            - name: shipper-code
              mountPath: /opt/shipper
              readOnly: true
          resources:
            requests:
              cpu: "50m"
              memory: "128Mi"
            limits:
              cpu: "300m"
              memory: "384Mi"
      volumes:
        - name: varlog
          hostPath:
            path: /var/log
            type: Directory
        - name: shipper-code
          configMap:
            name: fluent-bit-shipper-code
